apiVersion: nuk/v1
kind: Deployment
metadata:
  name: __REPO_NAME__              # must equal the repo name
spec:
  source: {}                      # leave empty; CI deploys from the runner checkout
  ingress:
    - host: __REPO_NAME__.astrojones.de
      service: web                # matches the service in docker-compose.yml
      port: 8080                  # the port your app listens on
  envFrom:
    - secretRef: /opt/nuklaut/secrets/__REPO_NAME__.env   # per-app (from APP_ENV)
    - secretRef: /opt/nuklaut/secrets/_shared.env         # org-wide

# ── Optional extras (uncomment as needed) ────────────────────────────────────
#
# Path split — /api -> backend, / -> frontend on the same host:
#  ingress:
#    - { host: __REPO_NAME__.astrojones.de, service: api, port: 8000, path: /api }
#    - { host: __REPO_NAME__.astrojones.de, service: web, port: 8080, path: / }
#
# Managed databases — nuk provisions creds and injects DATABASE_URL / REDIS_URL:
#  databases:
#    postgres: true                # or { driver: asyncpg } for SQLAlchemy/asyncpg
#    redis: true                   # ACL user; namespace keys as "__REPO_NAME__:*"
#
# Require GitHub org login in front of the app:
#  ingress:
#    - { host: __REPO_NAME__.astrojones.de, service: web, port: 8080, auth: oauth }
#
# Non-default compose file:
#  compose:
#    file: deploy/compose.prod.yml
